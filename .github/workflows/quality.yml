name: Performance Gates

# Deterministic real-time-safety + host-contract gates, separate from the Windows
# SonarCloud (code-quality) workflow so the two pipelines fail independently.
# Both jobs run on Linux: RTSan needs clang, and the existing CI is Windows/MSVC.
on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  # ---- Layer 2: real-time safety (RealtimeSanitizer) -----------------------
  rtsan:
    name: RTSan (audio-thread safety)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install JUCE Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb \
            libasound2-dev libjack-jackd2-dev libcurl4-openssl-dev \
            libfreetype-dev libfontconfig1-dev libx11-dev libxcomposite-dev \
            libxcursor-dev libxext-dev libxinerama-dev libxrandr-dev \
            libxrender-dev libglu1-mesa-dev mesa-common-dev

      - name: Install clang 20 (RealtimeSanitizer)
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20

      - uses: lukka/get-cmake@latest

      - name: Configure (clang + RTSan)
        run: >
          cmake -B build-rt -G Ninja
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DCMAKE_C_COMPILER=clang-20 -DCMAKE_CXX_COMPILER=clang++-20
          -DZW_RT_SANITIZE=ON

      - name: Build rt_check
        run: cmake --build build-rt --target rt_check --parallel

      - name: Run rt_check under RTSan
        env:
          RTSAN_OPTIONS: halt_on_error=1:suppressions=${{ github.workspace }}/tests/rtsan_suppressions.txt
        # ScopedJuceInitialiser_GUI needs a display even headless. JUCE nests the
        # binary under an artefacts/<config>/ dir, so discover it rather than guess.
        run: |
          BIN=$(find build-rt -type f -name rt_check -path '*_artefacts*' | head -1)
          echo "running $BIN"
          xvfb-run -a "$BIN"

  # ---- Layer 3: pluginval host-contract validation -------------------------
  pluginval:
    name: pluginval (strictness 5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install JUCE Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb \
            libasound2-dev libjack-jackd2-dev libcurl4-openssl-dev \
            libfreetype-dev libfontconfig1-dev libx11-dev libxcomposite-dev \
            libxcursor-dev libxext-dev libxinerama-dev libxrandr-dev \
            libxrender-dev libglu1-mesa-dev mesa-common-dev

      - uses: lukka/get-cmake@latest

      - name: Configure (Release)
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build VST3
        run: cmake --build build --target ZandersWave_VST3 --parallel

      - name: Download pluginval (pinned)
        run: |
          curl -L -o pluginval.zip \
            https://github.com/Tracktion/pluginval/releases/download/v1.0.4/pluginval_Linux.zip
          unzip -o pluginval.zip
          chmod +x pluginval

      - name: Validate
        run: |
          VST3=$(find build -name '*.vst3' -path '*_artefacts*' | head -1)
          echo "validating $VST3"
          xvfb-run -a ./pluginval --strictness-level 5 --validate-in-process \
            --timeout-ms 300000 "$VST3"
