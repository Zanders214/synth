name: Build & SonarCloud

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Analyze (Windows)
    runs-on: windows-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      BUILD_WRAPPER_OUT_DIR: bw-output
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so SonarCloud can attribute issues

      - name: Install CMake & Ninja
        uses: lukka/get-cmake@latest

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install SonarCloud build-wrapper & scanner
        uses: SonarSource/sonarcloud-github-c-cpp@v3

      - name: Configure (CMake + Ninja, Release)
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      # Build under the build-wrapper so the C/C++ analyzer learns the exact
      # compiler invocations. This step also validates the build on every push.
      - name: Build (wrapped)
        run: build-wrapper-win-x86-64 --out-dir "$env:BUILD_WRAPPER_OUT_DIR" cmake --build build --parallel

      # Runs only when the SONAR_TOKEN secret is present, so the build stays green
      # until SonarCloud is fully wired up.
      - name: SonarCloud scan
        if: env.SONAR_TOKEN != ''
        run: sonar-scanner --define sonar.cfamily.build-wrapper-output="$env:BUILD_WRAPPER_OUT_DIR"
