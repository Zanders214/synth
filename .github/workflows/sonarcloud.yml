name: Build & SonarCloud

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    name: Build & Analyze (Windows)
    runs-on: windows-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: https://sonarcloud.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so SonarCloud can attribute issues

      - name: Install CMake & Ninja
        uses: lukka/get-cmake@latest

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install SonarQube build-wrapper
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@v8

      - name: Configure (CMake + Ninja, Release)
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      # Build under the build-wrapper so the C/C++ analyzer learns the exact
      # compiler invocations. This step also validates the build on every push.
      - name: Build (wrapped)
        run: build-wrapper-win-x86-64 --out-dir bw-output cmake --build build --parallel

      # Runs the DSP unit-test suite under OpenCppCoverage: this both gates the
      # build on the tests passing (OpenCppCoverage returns the test exit code)
      # and emits SonarQube-format line coverage for the scan to import. The
      # unit_tests target is built with /Zi + /DEBUG so coverage maps to source.
      - name: DSP unit tests + coverage
        shell: cmd
        run: |
          choco install opencppcoverage -y --no-progress
          "C:\Program Files\OpenCppCoverage\OpenCppCoverage.exe" --quiet --export_type cobertura:cobertura.xml --sources src --excluded_sources _deps --modules unit_tests -- build\unit_tests_artefacts\Release\unit_tests.exe && python tools\cobertura_to_sonar.py cobertura.xml coverage.xml

      # Runs only when the SONAR_TOKEN secret is present, so the build stays green
      # until SonarCloud is fully wired up. Reads sonar-project.properties.
      - name: SonarQube Cloud scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v8
