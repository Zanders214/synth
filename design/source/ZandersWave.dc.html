  // ---- filter ----
  filterCurve(){
    const W=336,H=120; const p=this.state.p; const type=this.state.filterType;
    const cutN=p.cut, res=p.res; const fc=cutN; // 0..1 across log x
    const mag=(x)=>{
      const d=x-fc; let m;
      if(type.startsWith('HP')) m = x<fc? Math.max(0.02,1-(fc-x)*(type==='HP24'?6:3)) : 1;
      else if(type.startsWith('BP')||type==='Notch'){ const band=Math.exp(-Math.pow((x-fc)*7,2)); m=type==='Notch'?(1-band*0.95):band; }
      else m = x>fc? Math.max(0.02,1-(x-fc)*(type==='LP24'?6:3)) : 1;
      // resonance bump near fc
      const peak=res*1.4*Math.exp(-Math.pow((x-fc)*16,2));
      return Math.min(1.25,m+peak);
    };
    let pts='', fill='M0,'+H;
    const N=90; for(let i=0;i<=N;i++){ const x=i/N; const y=H-this.clamp(mag(x)/1.25)*(H-14)-6; pts+=(i?' ':'')+(x*W).toFixed(1)+','+y.toFixed(1); fill+=' L'+(x*W).toFixed(1)+','+y.toFixed(1); }
    fill+=' L'+W+','+H+' Z';
    const h=this.h;
    const grid=[]; for(let i=1;i<6;i++)grid.push(h('line',{key:'v'+i,x1:i*W/6,y1:0,x2:i*W/6,y2:H,stroke:'rgba(255,255,255,0.04)',strokeWidth:1}));
    return h('svg',{viewBox:`0 0 ${W} ${H}`,width:'100%',height:'100%'},
      grid,
      h('defs',null,h('linearGradient',{id:'fcurve',x1:0,y1:0,x2:0,y2:1},
        h('stop',{offset:'0%',stopColor:'rgba(94,147,255,0.30)'}),h('stop',{offset:'100%',stopColor:'rgba(94,147,255,0)'}))),
      h('path',{d:fill,fill:'url(#fcurve)'}),
      h('polyline',{points:pts,fill:'none',stroke:'#5e93ff',strokeWidth:2,style:{filter:'drop-shadow(0 0 6px rgba(94,147,255,.5))'}}),
      h('line',{x1:fc*W,y1:0,x2:fc*W,y2:H,stroke:'rgba(255,255,255,0.18)',strokeWidth:1,strokeDasharray:'3 3'})
    );
  }

  // ---- modulation row: ENV + LFO + Macros ----
  envCurve(e){

    const x0=pad, ax=x0+a*(W-2*pad), dx=ax+d*(W-2*pad), sx=W-pad-r*(W-2*pad), ex=W-pad;
    const yTop=10, yBot=H-10; const sy=yBot-(s)*(yBot-yTop);
    const h=this.h;
    const path=`M${x0},${yBot} L${ax.toFixed(1)},${yTop} L${dx.toFixed(1)},${sy.toFixed(1)} L${sx.toFixed(1)},${sy.toFixed(1)} L${ex},${yBot}`;
    const fill=path+` L${x0},${yBot} Z`;
    return h('svg',{viewBox:`0 0 ${W} ${H}`,width:'100%',height:'100%'},
      h('defs',null,h('linearGradient',{id:'env',x1:0,y1:0,x2:0,y2:1},h('stop',{offset:'0%',stopColor:'rgba(52,216,255,0.28)'}),h('stop',{offset:'100%',stopColor:'rgba(52,216,255,0)'}))),
      h('path',{d:fill,fill:'url(#env)'}),
      h('path',{d:path,fill:'none',stroke:'#34d8ff',strokeWidth:2,strokeLinejoin:'round',style:{filter:'drop-shadow(0 0 5px rgba(52,216,255,.5))'}}),
      [[x0,yBot],[ax,yTop],[dx,sy],[sx,sy]].map((p,i)=>h('circle',{key:i,cx:p[0],cy:p[1],r:3.2,fill:'#06070c',stroke:'#34d8ff',strokeWidth:1.5}))
    );

                  {k:'B',name:'OSC B',on:s.oscB_on,lvl:'bLvl',col:'#8b7bff',tog:'oscB_on'},
                  {k:'SUB',name:'SUB',on:s.sub_on,lvl:'subLvl',col:'#34d8ff',tog:'sub_on'},
                  {k:'NOISE',name:'NOISE',on:s.noise_on,lvl:'noiLvl',col:'#ffc24b',tog:'noise_on'} ];
    return h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}, chans.map(c=>{
      const seld=s.oscSel===c.k;
      return h('div',{key:c.k,onClick:()=>this.setState({oscSel:c.k}),style:{cursor:'pointer',padding:'11px 13px',borderRadius:11,background:seld?'rgba(94,147,255,0.07)':'rgba(255,255,255,0.02)',border:'1px solid '+(seld?'var(--accent-line)':'rgba(255,255,255,0.06)'),transition:'all .15s'}},
        h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}},
          h('span',{style:{fontSize:10.5,fontWeight:600,letterSpacing:'0.08em',color:c.on?'var(--text-1)':'var(--text-faint)'}},c.name),
          h('button',{onClick:e=>{e.stopPropagation(); this.setState(st=>({[c.tog]:!st[c.tog]}));},style:{width:10,height:10,padding:0,borderRadius:'50%',cursor:'pointer',border:'none',background:c.on?c.col:'rgba(255,255,255,0.16)',boxShadow:c.on?`0 0 7px ${c.col}`:'none'}})
        ),
        h('div',{style:{opacity:c.on?1:0.4}}, this.ns()?h(this.ns().Slider,{value:s.p[c.lvl],onChange:x=>this.setP(c.lvl,x),gradient:c.col==='#ffc24b'?'var(--ramp-warm)':'var(--ramp-cool)',valueLabel:this.pc(s.p[c.lvl]),label:'LEVEL'}):null)
      );
    }));
  }

  leftRail(){ const h=this.h; return h('div',{style:{display:'flex',flexDirection:'column',gap:12}}, this.renderEnv(), this.renderLfo()); }
  macrosBar(){
    const h=this.h; const s=this.state; const assigning=s.assign&&s.assign.indexOf('MACRO')===0;
    return h('div',{style:{display:'flex',flexDirection:'column',justifyContent:'center',padding:'10px 18px',borderRadius:12,background:'rgba(255,255,255,0.018)',border:'var(--border-line)'}},
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}},
        h('span',{style:{fontSize:10,letterSpacing:'0.16em',color:'var(--text-label)',fontWeight:600}},'MACROS'),
        h('span',{style:{fontFamily:'var(--font-mono)',fontSize:8.5,color:assigning?'var(--accent)':'var(--text-faint)'}}, assigning?'CLICK A KNOB':'DRAG \u2192 ASSIGN')),
      h('div',{style:{display:'flex',gap:16}}, [1,2,3,4].map(i=>{ const id='m'+i; const on=s.assign==='MACRO'+i;
        return h('div',{key:id,style:{position:'relative',display:'flex',flexDirection:'column',alignItems:'center',gap:3}},
          this.ns()?h(this.ns().Dial,{value:s.p[id],onChange:x=>this.setP(id,x),color:'#5e93ff',label:'MACRO '+i,size:56,format:x=>Math.round(x*100)+'%'}):null,
          h('button',{onClick:()=>this.setState(st=>({assign:st.assign==='MACRO'+i?null:'MACRO'+i})),style:{marginTop:-2,fontSize:7.5,letterSpacing:'0.1em',padding:'2px 8px',borderRadius:5,cursor:'pointer',background:on?'var(--accent)':'rgba(94,147,255,0.12)',color:on?'#fff':'var(--accent)',border:'1px solid var(--accent-line)'}},on?'\u25cf':'ASSIGN')); }))
    );
  }
  footer(){
    const h=this.h;
    return h('div',{style:{display:'grid',gridTemplateColumns:'auto 1fr',gap:12,alignItems:'stretch'}}, this.macrosBar(), this.renderKeyboard());
  }
  rightRail(){ const h=this.h; return h('div',{style:{display:'flex',flexDirection:'column',gap:12}}, this.renderFilter(), this.scopeOut()); }
  scopeOut(){
    const h=this.h; const NS=this.ns(); const Scope=this.Scope; const s=this.state; const active=s.voices>0;
    return this.module([
      this.titleRow('OUTPUT', h('span',{style:{fontFamily:'var(--font-mono)',fontSize:9,color:'var(--text-faint)'}}, s.voices+' VOICE'+(s.voices===1?'':'S'))),
      this.well(h('div',{style:{height:62,padding:'8px 12px'}}, Scope?h(Scope,{color:'#5e93ff',active}):null)),
      h('div',{style:{display:'flex',alignItems:'center',gap:18,marginTop:14}},
        h('div',{style:{flex:1}}, NS&&NS.Meter?h(NS.Meter,{value:Math.min(1,0.1+s.voices*0.12),height:8}):null,
          h('div',{style:{display:'flex',justifyContent:'space-between',marginTop:7,fontFamily:'var(--font-mono)',fontSize:8.5,color:'var(--text-faint)'}}, h('span',null,'-\u221e'),h('span',null,'-12'),h('span',null,'-6'),h('span',null,'0 dB'))),
        this.dial('out','MASTER',{size:70,color:'#5e93ff',fmt:x=>(x*24-24).toFixed(1)})
      )
    ]);
  }

  renderUI(){
    const h=this.h;
    if(typeof window!=='undefined' && !window.React) window.React=React;
    try{ this._mkAnim(true); }catch(e){}
    const NS=this.ns();
    if(!NS || !NS.Dial || !NS.Slider || !NS.Keyboard || !NS.Meter || !this.Wavetable){ return h('div',{style:{height:760,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-faint)',fontFamily:'var(--font-mono)',fontSize:12}},'loading instrument\u2026'); }
    return h('div',{style:{display:'flex',flexDirection:'column',gap:13,cursor:this.state.assign?'crosshair':'default'}},
      this.renderHeader(),
      h('div',{style:{display:'grid',gridTemplateColumns:'304px 1fr 344px',gap:12,alignItems:'start'}},
        this.leftRail(),
        h('div',{style:{display:'flex',flexDirection:'column',gap:12}}, this.heroOsc(), this.sourceMixer()),
        this.rightRail()
      ),
      h('div',{style:{padding:'0 2px'}}, this.sourceRail()),
      h('div',{style:{borderRadius:12,border:'var(--border-line)',background:'rgba(255,255,255,0.012)',overflow:'hidden'}},
        h('div',{style:{padding:'0 14px',borderBottom:'var(--border-hairline)'}}, this.renderTabs()),
        h('div',{style:{padding:'0 14px',minHeight:226}}, this.tabBody())
      ),
      this.footer()
    );
  }

  renderVals(){ return { ui: this.renderUI() }; }
}
</script>
</body>
</html>
