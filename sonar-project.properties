sonar.projectKey=zandersdaw_synth
sonar.organization=zandersdaw
sonar.host.url=https://sonarcloud.io

# Analyze only our source; JUCE (fetched into build/_deps) is excluded.
sonar.sources=src
sonar.sourceEncoding=UTF-8

# C/C++ analysis is CI-based via the SonarSource build-wrapper (Automatic Analysis
# must be turned OFF in the SonarCloud project settings for C/C++).
sonar.cfamily.build-wrapper-output=bw-output

# ---- Test coverage ---------------------------------------------------------
# Line coverage from the DSP unit-test suite (tests/unit/*), measured by
# OpenCppCoverage in CI and exported in SonarQube generic format. The UI/visual
# code and the plugin/framework glue carry no unit coverage (they are exercised
# by ui_snapshot + pluginval instead), so they are excluded from coverage scoring
# rather than dragging the metric down.
sonar.coverageReportPaths=coverage.xml
sonar.coverage.exclusions=src/PluginEditor.cpp,src/PluginEditor.h,src/PluginProcessor.cpp,src/PluginProcessor.h,src/ui/**

# ---------------------------------------------------------------------------
# Issue suppressions (won't-fix), each justified.
# These are deliberate design choices or analyzer false positives, NOT debt.
# Everything else flagged by SonarCloud is fixed in the code; this list is the
# residue that is correct as-is. Reviewable here rather than hidden in the UI.
# ---------------------------------------------------------------------------
sonar.issue.ignore.multicriteria=rt1,fld1,fld2,fld3,en1,en2,en3,en4,acc1,acc2,ovl1,cst1,mut1,own1,vp1,fp1,fp2,fp3,fp4,cx1

# S8417 — atomic memory ordering. ModMatrix is a single-producer/single-consumer
# lock-free double buffer: a release store publishes the buffer index, acquire
# loads consume it, and the writer's self-read is relaxed. seq_cst would add a
# redundant full fence on the per-block audio path for zero correctness gain.
# This is exactly the RT-safety design the project's M8 milestone established.
sonar.issue.ignore.multicriteria.rt1.ruleKey=cpp:S8417
sonar.issue.ignore.multicriteria.rt1.resourceKey=src/dsp/ModMatrix.*

# S1820 — "too many fields". Inherent to a Serum-class synth: the editor owns
# every widget, the voice aggregates all sources/filter/envs/LFOs + note state,
# and ParamRefs is a deliberate flat cache of APVTS handles so the audio thread
# never does per-sample string lookups. Splitting adds churn and hot-path indirection.
sonar.issue.ignore.multicriteria.fld1.ruleKey=cpp:S1820
sonar.issue.ignore.multicriteria.fld1.resourceKey=src/PluginEditor.cpp
sonar.issue.ignore.multicriteria.fld2.ruleKey=cpp:S1820
sonar.issue.ignore.multicriteria.fld2.resourceKey=src/dsp/Voice.h
sonar.issue.ignore.multicriteria.fld3.ruleKey=cpp:S1820
sonar.issue.ignore.multicriteria.fld3.resourceKey=src/dsp/ParamRefs.h

# S3642 — plain enum vs enum class. Every one is an integer index sourced from an
# APVTS choice parameter, used as switch labels / array indices / cross-file int
# assignments. enum class would lose the implicit int conversion and force casts
# at every boundary for no real type-safety gain on these index enums.
sonar.issue.ignore.multicriteria.en1.ruleKey=cpp:S3642
sonar.issue.ignore.multicriteria.en1.resourceKey=src/ui/Theme.h
sonar.issue.ignore.multicriteria.en2.ruleKey=cpp:S3642
sonar.issue.ignore.multicriteria.en2.resourceKey=src/dsp/Lfo.h
sonar.issue.ignore.multicriteria.en3.ruleKey=cpp:S3642
sonar.issue.ignore.multicriteria.en3.resourceKey=src/dsp/BasicSources.h
sonar.issue.ignore.multicriteria.en4.ruleKey=cpp:S3642
sonar.issue.ignore.multicriteria.en4.resourceKey=src/dsp/MultimodeFilter.h

# S5414 — mixed public/private members. The public data members are deliberate
# JUCE surfaces: LabeledKnob::slider is positioned by the parent's resized(), and
# the processor's apvts/keyboardState are bound by the editor's attachments and
# MidiKeyboardComponent. Hiding them behind getters gains nothing.
sonar.issue.ignore.multicriteria.acc1.ruleKey=cpp:S5414
sonar.issue.ignore.multicriteria.acc1.resourceKey=src/PluginEditor.cpp
sonar.issue.ignore.multicriteria.acc2.ruleKey=cpp:S5414
sonar.issue.ignore.multicriteria.acc2.resourceKey=src/PluginProcessor.h

# S1242 — processBlock(float) hides the double overload + processBlockBypassed.
# This is the universal JUCE idiom; the double path is unreachable unless
# supportsDoublePrecisionProcessing() (default false). A using-decl would expose
# a default double processBlock that asserts. (Voice::renderNextBlock IS fixed.)
sonar.issue.ignore.multicriteria.ovl1.ruleKey=cpp:S1242
sonar.issue.ignore.multicriteria.ovl1.resourceKey=src/PluginProcessor.h

# S5951 — leading const on getName()/getProgramName() return value. It looks
# meaningless, but juce::AudioProcessor declares these as 'virtual const String
# getName() const = 0', and MSVC requires an override's return type to match the
# base exactly (it does not ignore top-level const like GCC/Clang). Dropping the
# const makes the methods stop overriding the pure virtuals -> the class becomes
# abstract and the build fails. The const is mandatory here.
sonar.issue.ignore.multicriteria.cst1.ruleKey=cpp:S5951
sonar.issue.ignore.multicriteria.cst1.resourceKey=src/PluginProcessor.h

# S5817 — resetToDefaults/setActual "could be const". They mutate host-observable
# parameter state via setValueNotifyingHost through a reference member (const does
# not propagate), so const would falsely advertise read-only semantics on
# destructive operations. (saveUserPreset, which is genuinely read-only, IS const.)
sonar.issue.ignore.multicriteria.mut1.ruleKey=cpp:S5817
sonar.issue.ignore.multicriteria.mut1.resourceKey=src/PresetManager.cpp

# S5025 — raw new in createEditor/createPluginFilter. These are framework ownership
# transfer points: the return types are fixed by JUCE virtuals / the plugin entry
# point, so make_unique(...).release() would just reproduce the same raw new.
# (The 14 editor OwnedArray cases ARE converted to make_unique.)
sonar.issue.ignore.multicriteria.own1.ruleKey=cpp:S5025
sonar.issue.ignore.multicriteria.own1.resourceKey=src/PluginProcessor.cpp

# S5008 — void* parameter. This is the framework-mandated signature of the
# setStateInformation override (const void*, int); narrowing it breaks the override.
sonar.issue.ignore.multicriteria.vp1.ruleKey=cpp:S5008
sonar.issue.ignore.multicriteria.vp1.resourceKey=src/PluginProcessor.cpp

# S995 false positive — the wet juce::dsp::AudioBlock<float>& in Effects.h is
# written to in the loop, so it cannot be reference-to-const.
sonar.issue.ignore.multicriteria.fp1.ruleKey=cpp:S995
sonar.issue.ignore.multicriteria.fp1.resourceKey=src/dsp/fx/Effects.h

# S3230 — juce::dsp::Oversampling has no default constructor, so 'os' MUST be
# initialised in the ctor init-list; an in-class initializer is impossible here.
sonar.issue.ignore.multicriteria.fp2.ruleKey=cpp:S3230
sonar.issue.ignore.multicriteria.fp2.resourceKey=src/dsp/fx/Effects.h

# S1874 false positive — flagged at a line with no juce::Font constructor; the only
# Font construction in PluginEditor.cpp already uses the non-deprecated FontOptions
# form. (The genuinely deprecated ctors in ZWLookAndFeel.cpp ARE fixed.)
sonar.issue.ignore.multicriteria.fp3.ruleKey=cpp:S1874
sonar.issue.ignore.multicriteria.fp3.resourceKey=src/PluginEditor.cpp

# S2681 false positive — the flagged Arpeggiator branch is correct as written; the
# 'continue' is meant to run unconditionally inside the braced outer block.
sonar.issue.ignore.multicriteria.fp4.ruleKey=cpp:S2681
sonar.issue.ignore.multicriteria.fp4.resourceKey=src/dsp/Arpeggiator.cpp

# S3776 — ZWVoice::renderNextBlock cognitive complexity. This is the audio render
# hot loop (ZW_RT_NONBLOCKING); extracting helpers risks changing release-build
# inlining/vectorisation. Left intact deliberately. (Arpeggiator::process IS refactored.)
sonar.issue.ignore.multicriteria.cx1.ruleKey=cpp:S3776
sonar.issue.ignore.multicriteria.cx1.resourceKey=src/dsp/Voice.cpp
