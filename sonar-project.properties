sonar.projectKey=zandersdaw_synth
sonar.organization=zandersdaw
sonar.host.url=https://sonarcloud.io

# Analyze only our source; JUCE (fetched into build/_deps) is excluded.
sonar.sources=src
sonar.sourceEncoding=UTF-8

# C/C++ analysis is CI-based via the SonarSource build-wrapper (Automatic Analysis
# must be turned OFF in the SonarCloud project settings for C/C++).
sonar.cfamily.build-wrapper-output=bw-output
